name: Deploy to GCP (Artifact Registry)

on:
  push:
    branches: [ "main" ]

env:
  # GCP 프로젝트 및 리포지토리 설정
  PROJECT_ID: mai-port
  GAR_LOCATION: asia-northeast3
  REPOSITORY: aisa-repo
  IMAGE: aisa-portfolio
  CONTAINER_NAME: aisa-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # WIF 인증을 위해 필수

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 워크로드 아이덴티티(WIF) 인증 (키 파일 없이 인증)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Artifact Registry 로그인
      - name: Login to Artifact Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # 3. 도커 이미지 빌드 및 푸시
      # (주의: Dockerfile이 AISA 폴더 안에 있다면 context: ./AISA 유지)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to GCE
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          envs: PROJECT_ID,GAR_LOCATION,REPOSITORY,IMAGE,CONTAINER_NAME
          script: |
            # 1. GAR 인증 (VM이 이미지를 가져오기 위함)
            gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet || true
            
            # 2. 이미지 전체 주소 변수 지정
            FULL_IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"
            
            echo "Deploying $FULL_IMAGE_URI ..."

            # 3. 최신 이미지 다운로드 (Pull)
            docker pull $FULL_IMAGE_URI || { echo "Docker pull failed."; exit 1; }

            # 4. 기존 컨테이너 중지 및 삭제
            if [ "$(docker ps -aq -f name=${{ env.CONTAINER_NAME }})" ]; then
                echo "Stopping existing container..."
                docker stop ${{ env.CONTAINER_NAME }}
                docker rm ${{ env.CONTAINER_NAME }}
            fi

            # 5. 새 컨테이너 실행 (여기가 핵심!)
            # DB 접속 주소를 172.17.0.1 (Docker Host)로 설정하여 로컬 DB에 접속
            echo "Starting container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8080:8080 \
              -v ~/logs:/logs \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://172.17.0.1:3306/aisa_portfolio?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
              -e SPRING_JPA_SHOW_SQL="true" \
              -e SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL="true" \
              \
              -e KIS_BASE_URL="https://openapi.koreainvestment.com:9443" \
              -e KIS_AUTH_URL="/oauth2/tokenP" \
              -e KIS_APPKEY="${{ secrets.KIS_APP_KEY }}" \
              -e KIS_APPSECRET="${{ secrets.KIS_APP_SECRET }}" \
              -e KIS_PRICE_URL="/uapi/domestic-stock/v1/quotations/inquire-price" \
              -e KIS_INDEX_PRICE_URL="/uapi/domestic-stock/v1/quotations/inquire-index-price" \
              -e KIS_INDEX_CHART_URL="/uapi/domestic-stock/v1/quotations/inquire-index-daily-price" \
              -e KIS_STOCK_CHART_URL="/uapi/domestic-stock/v1/quotations/inquire-daily-itemchartprice" \
              -e KIS_DIVIDEND_URL="/uapi/domestic-stock/v1/ksdinfo/dividend" \
              -e KIS_OVERSEA_URL="/uapi/overseas-price/v1/quotations/inquire-daily-chartprice" \
              -e KIS_VOLUME_RANK_URL="/uapi/domestic-stock/v1/quotations/volume-rank" \
              -e KIS_DIVIDEND_RANK_URL="/uapi/domestic-stock/v1/ranking/dividend-rate" \
              -e KIS_INCOME_STATEMENT_URL="/uapi/domestic-stock/v1/finance/income-statement" \
              -e KIS_BALANCE_SHEET_URL="/uapi/domestic-stock/v1/finance/balance-sheet" \
              -e KIS_FINANCIAL_RATIO_URL="/uapi/domestic-stock/v1/finance/financial-ratio" \
              \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_ACCESS_TOKEN_EXPIRATION_TIME="21600000" \
              -e JWT_REFRESH_TOKEN_EXPIRATION_TIME="1209600000" \
              -e ECOS_BASE_URL="http://ecos.bok.or.kr/api" \
              -e ECOS_API_KEY="${{ secrets.ECOS_API_KEY }}" \
              \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE="email,profile" \
              \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_AUTHENTICATION_METHOD="client_secret_post" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_AUTHORIZATION_GRANT_TYPE="authorization_code" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI="http://${{ secrets.GCP_SSH_HOST }}.nip.io:8080/login/oauth2/code/kakao" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_SCOPE="account_email,profile_nickname" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_NAME="Kakao" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_AUTHORIZATION_URI="https://kauth.kakao.com/oauth/authorize" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_TOKEN_URI="https://kauth.kakao.com/oauth/token" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_INFO_URI="https://kapi.kakao.com/v2/user/me" \
              -e SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_NAME_ATTRIBUTE="id" \
              \
              -e GOOGLE_AI_STUDIO_API_KEY="${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}" \
              \
              $FULL_IMAGE_URI

            # 6. 불필요한(Dangling) 이미지 정리 (디스크 용량 확보)
            docker image prune -f
            
            echo "Deployment successful!"