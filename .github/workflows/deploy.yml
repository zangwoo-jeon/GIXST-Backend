name: Deploy to GCP (Artifact Registry)

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast3 # Seoul
  REPOSITORY: aisa-repo
  IMAGE: aisa-portfolio
  CONTAINER_NAME: aisa-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    runs-on: ubuntu-latest


    steps:
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./AISA
          push: true
          tags: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to GCE
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          envs: PROJECT_ID,GAR_LOCATION,REPOSITORY,IMAGE,CONTAINER_NAME
          script: |
            # 1. Login to GAR
            # (중요) VM은 "Compute Engine default service account"를 사용 중일 것이므로,
            # 해당 SA에 "Artifact Registry Reader" 권한만 있으면 gcloud auth configure-docker 만으로 충분합니다.
            
            gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet || true
            
            # 2. Define Image URI
            FULL_IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"
            
            echo "Deploying $FULL_IMAGE_URI ..."

            # 3. Pull Image
            docker pull $FULL_IMAGE_URI || { echo "Docker pull failed. Ensure VM has 'Artifact Registry Reader' permission."; exit 1; }

            # 4. Stop & Remove Existing Container
            if [ "$(docker ps -aq -f name=${{ env.CONTAINER_NAME }})" ]; then
                echo "Stopping existing container..."
                docker stop ${{ env.CONTAINER_NAME }}
                docker rm ${{ env.CONTAINER_NAME }}
            fi

            # 5. Run New Container
            # (로그 디렉토리 마운트 및 헬스 체크 포함)
            mkdir -p ~/logs
            
            echo "Starting container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8080:8080 \
              -v ~/logs:/logs \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://${{ secrets.GCP_SSH_HOST }}:3306/aisa_portfolio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8" \
              -e SPRING_DATASOURCE_USERNAME="user" \
              -e SPRING_DATASOURCE_PASSWORD="password" \
              -e KIS_API_APPKEY="${{ secrets.KIS_APP_KEY }}" \
              -e KIS_API_APPSECRET="${{ secrets.KIS_APP_SECRET }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e ECOS_API_KEY="${{ secrets.ECOS_API_KEY }}" \
              $FULL_IMAGE_URI

            # 6. Health Check Loop
            echo "Waiting for service to start..."
            for i in {1..10}; do
              if curl -s http://localhost:8080/actuator/health | grep 'UP' > /dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Waiting... ($i/10)"
              sleep 10
            done

            echo "Health check failed or timed out."
            # (Optional) docker logs ${{ env.CONTAINER_NAME }}
            # exit 1  <-- Uncomment to fail the job if health check fails
